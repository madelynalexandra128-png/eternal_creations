<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/bootstrap.css">
    <title>products</title>
</head>
<body>
    
    <section class="container py-5">

                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">

                    </div>
                </div>
            </aside>

            <!-- Productos -->
            <div class="col-lg-9">

                <div class="row g-4">

                    <!-- Producto -->
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card h-100">
                            <img src="img/rosa.jpg" class="card-img-top" alt="">

                            </div>
                        </div>
                    </div>

                    <!-- Producto -->

                        </div>
                    </div>

                    <!-- Producto -->

                            <img src="img/rosa.jpg" class="card-img-top" alt="">
                            <div class="card-body text-center">
                                <h5 class="card-title">Caja</h5>
                                <p class="fw-bold">$96.000</p>
                            </div>
                        </div>
                    </div>

                    <!-- Más productos -->
                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card h-100">

                    </div>

                                <h5 class="card-title">Peluche</h5>
                                <p class="fw-bold">$80.000</p>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 col-lg-4">
                        <div class="card h-100">
                            <img src="img/rosa.jpg" class="card-img-top" alt="">
                            <div class="card-body text-center">
                                <h5 class="card-title">Deluxe</h5>
                                <p class="fw-bold">$120.000</p>
